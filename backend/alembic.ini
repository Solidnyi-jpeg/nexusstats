[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# --- ОПТИМІЗАЦІЯ ДЛЯ РОЗРОБНИКА ---
# Тепер файли міграцій будуть мати зрозумілий вигляд з датою та часом:
# Наприклад: 2026_06_03_1230-1a2b3c4d_add_users_table.py
# Це дозволить їм сортуватися хронологічно у твоєму редакторі коду.
file_template = %%(year)d_%%(month)02d_%%(day)02d_%%(hour)02d%%(minute)02d-%%(rev)s_%%(slug)s

# Ми НЕ хардкодимо sqlalchemy.url тут. 
# Замість цього ми налаштуємо alembic/env.py так, щоб він читав settings.database_url
# sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S